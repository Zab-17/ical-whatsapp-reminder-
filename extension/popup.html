<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, sans-serif; background: #0f172a; color: #e8edf5; padding: 24px; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: 12px; margin-bottom: 20px; }
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 10px 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #c41230; }
    .btn { width: 100%; padding: 11px; background: #c41230; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: block; text-align: center; text-decoration: none; margin-bottom: 8px; }
    .btn:hover { background: #a00e28; }
    .btn.green { background: #059669; }
    .btn.green:hover { background: #047857; }
    .msg { margin-top: 12px; font-size: 12px; padding: 10px; border-radius: 8px; }
    .msg.info { background: #1e293b; color: #94a3b8; }
    .view { display: none; }
    .view.active { display: block; }
  </style>
</head>
<body>
  <div id="v-setup" class="view active">
    <h1>Canvas Reminder</h1>
    <p class="sub">Get WhatsApp assignment reminders</p>
    <label>Your Name</label>
    <input type="text" id="name" placeholder="Zeyad">
    <label>WhatsApp Number</label>
    <input type="tel" id="phone" placeholder="201XXXXXXXXX">
    <button class="btn" id="saveBtn">Save & Continue</button>
  </div>

  <div id="v-canvas" class="view">
    <h1>Now log into Canvas</h1>
    <p class="sub">Click below, log in normally, then come back and click "I'm logged in"</p>
    <a href="https://aucegypt.instructure.com" target="_blank" class="btn">Open Canvas</a>
    <button class="btn green" id="doneBtn">I'm logged in</button>
    <div id="statusMsg" class="msg info" style="display:none"></div>
  </div>

  <div id="v-done" class="view" style="text-align:center">
    <div style="font-size:36px;margin-bottom:12px">✅</div>
    <h1>Connected!</h1>
    <p class="sub" style="margin-bottom:0">Send <strong style="color:#fff">hi</strong> on WhatsApp to start</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
