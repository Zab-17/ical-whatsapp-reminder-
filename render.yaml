services:
  - type: web
    name: canvas-reminder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.webhook:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: CANVAS_API_URL
        sync: false
      - key: CANVAS_API_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: USER_WHATSAPP_TO
        sync: false
