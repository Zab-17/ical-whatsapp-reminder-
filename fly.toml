app = 'canvas-reminder-auc'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[env]
  CANVAS_API_URL = 'https://aucegypt.instructure.com'
  BAILEYS_BRIDGE_URL = 'http://localhost:3001'
  DATABASE_PATH = '/data/canvas_reminder.db'
  BRIDGE_PORT = '3001'
  PYTHON_WEBHOOK_URL = 'http://localhost:8000/webhook/whatsapp'
  WA_SESSION_PATH = '/data/wa_session'

[mounts]
  source = 'canvas_data'
  destination = '/data'
